<style>
  :root {
    --bg: #050505;
    --fg: #F3F3F3;
    --muted: #666666;
    --border: rgba(255, 255, 255, 0.15);
    --accent: #FF3366;
    --font-display: 'Anton', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html { scroll-behavior: smooth; }
  
  body {
    background-color: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; object-fit: cover; }
  ul { list-style: none; }

  /* Typography */
  .display-text {
    font-family: var(--font-display);
    text-transform: uppercase;
    line-height: 0.85;
    letter-spacing: 0.01em;
  }
  
  .text-huge { font-size: clamp(4rem, 15vw, 15rem); }
  .text-large { font-size: clamp(3rem, 8vw, 8rem); }
  .text-medium { font-size: clamp(2rem, 5vw, 5rem); }
  .text-small { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  
  .color-accent { color: var(--accent); }
  .color-muted { color: var(--muted); }

  /* Layout */
  .container {
    width: 100%;
    padding: 0 2rem;
  }
  @media (max-width: 768px) { .container { padding: 0 1rem; } }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    mix-blend-mode: difference;
  }
  .logo { font-family: var(--font-display); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
  .nav-links a:hover { color: var(--accent); }
  @media (max-width: 768px) { .nav-links { display: none; } }

  /* Hero */
  .hero {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 8rem 2rem 4rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .hero-info {
    max-width: 600px;
    font-size: 1.1rem;
    color: var(--muted);
    font-weight: 500;
    margin: 2rem auto 0;
  }
  .hero-title {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Marquee */
  .marquee {
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    white-space: nowrap;
    display: flex;
    background: var(--fg);
    color: var(--bg);
  }
  .marquee-content {
    display: flex;
    animation: scroll 15s linear infinite;
  }
  .marquee-item {
    font-family: var(--font-display);
    font-size: 1.5rem;
    text-transform: uppercase;
    padding: 0 2rem;
  }
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Section */
  .section {
    padding: 6rem 0;
    border-bottom: 1px solid var(--border);
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 4rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 6vw, 6rem);
    text-transform: uppercase;
    line-height: 0.9;
  }
  .section-num {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--accent);
  }

  /* About */
  .about-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 4rem;
    align-items: center;
  }
  .about-text {
    font-size: clamp(1.5rem, 2.5vw, 2.5rem);
    line-height: 1.2;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .about-image {
    width: 100%;
    aspect-ratio: 4/5;
    background: #111;
    position: relative;
    overflow: hidden;
  }
  .about-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%);
    transition: filter 0.5s ease, transform 0.5s ease;
  }
  .about-image:hover img {
    filter: grayscale(0%);
    transform: scale(1.05);
  }
  @media (max-width: 768px) {
    .about-grid { grid-template-columns: 1fr; gap: 2rem; }
  }

  /* Experience Table */
  .exp-table {
    width: 100%;
  }
  .exp-row {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    padding: 2rem 0;
    border-bottom: 1px solid var(--border);
    transition: background-color 0.3s ease, padding-left 0.3s ease;
    cursor: pointer;
    align-items: center;
  }
  .exp-row:hover {
    background-color: #111;
    padding-left: 1rem;
  }
  .exp-date { font-family: var(--font-body); font-weight: 600; color: var(--muted); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .exp-role { font-family: var(--font-display); font-size: clamp(1.5rem, 3vw, 3rem); text-transform: uppercase; line-height: 1; }
  .exp-company { font-weight: 600; text-align: right; color: var(--accent); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
  @media (max-width: 768px) {
    .exp-row { grid-template-columns: 1fr; gap: 0.5rem; padding: 1.5rem 0; }
    .exp-company { text-align: left; }
  }

  /* Projects / Brands Grid */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .project-card {
    position: relative;
    aspect-ratio: 4/5;
    overflow: hidden;
    background: var(--bg);
  }
  .project-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%);
    transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
  }
  .project-card:hover img {
    transform: scale(1.05);
    filter: grayscale(0%);
  }
  .project-info {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    padding: 2rem;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.4s ease;
  }
  .project-card:hover .project-info {
    transform: translateY(0);
    opacity: 1;
  }
  .project-title {
    font-family: var(--font-display);
    font-size: 2rem;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  .project-category {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Brand Logos Grid */
  .brand-logos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .brand-logo {
    background: var(--bg);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transition: background 0.3s ease;
  }
  .brand-logo:hover {
    background: #111;
  }
  .brand-logo img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    filter: grayscale(100%) brightness(200%);
    transition: filter 0.3s ease;
  }
  .brand-logo:hover img {
    filter: grayscale(0%) brightness(100%);
  }

  /* Footer */
  .footer {
    padding: 8rem 0 4rem;
    text-align: center;
    border-top: 1px solid var(--border);
  }
  .footer-title {
    font-family: var(--font-display);
    font-size: clamp(4rem, 15vw, 15rem);
    text-transform: uppercase;
    line-height: 0.8;
    margin-bottom: 2rem;
  }
  .footer-links {
    display: flex;
    justify-content: center;
    gap: 3rem;
    margin-top: 4rem;
  }
  .footer-links a {
    font-size: 0.875rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    position: relative;
  }
  .footer-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.3s ease;
  }
  .footer-links a:hover::after {
    transform: scaleX(1);
    transform-origin: left;
  }

  /* Utilities */
  .mt-4 { margin-top: 4rem; }
  .mb-4 { margin-bottom: 4rem; }
  .pt-4 { padding-top: 4rem; }
  .pb-4 { padding-bottom: 4rem; }

  /* Modals */
  .project-card { cursor: pointer; }
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
  }
  .modal-content {
    background-color: #111;
    margin: 10% auto;
    padding: 3rem;
    border: 1px solid var(--border);
    width: 90%;
    max-width: 700px;
    position: relative;
    border-radius: 8px;
    color: var(--fg);
  }
  .close-btn {
    color: var(--muted);
    position: absolute;
    top: 1rem;
    right: 1.5rem;
    font-size: 2rem;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.3s;
  }
  .close-btn:hover {
    color: var(--accent);
  }
  .modal-body ul {
    margin-left: 1.5rem;
    list-style-type: disc;
    margin-bottom: 1.5rem;
  }
  .modal-body li {
    margin-bottom: 0.5rem;
    color: #ccc;
  }
  .modal-body strong {
    color: var(--fg);
  }
</head>
